name: Build and publish Docker images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # All-in-one image (frontend + API + worker + postgres + mosquitto + saic gateway)
          - label: all-in-one
            image: garagestack
            context: .
            dockerfile: docker/all-in-one/Dockerfile

          # Individual service images (used with docker-compose)
          - label: frontend
            image: garagestack-frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile

          - label: api
            image: garagestack-api
            context: .
            dockerfile: src/GarageStack.Api/Dockerfile

          - label: worker
            image: garagestack-worker
            context: .
            dockerfile: src/GarageStack.Worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || github.token }}"
          echo "$TOKEN" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

      - name: GHCR auth preflight
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ matrix.image }}"
          SCOPE="repository:${{ github.repository_owner }}/${IMAGE}:pull,push"
          STATUS=$(curl -sS -o /tmp/ghcr-token.json -w "%{http_code}" \
            -u "${{ github.actor }}:${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || github.token }}" \
            "https://ghcr.io/token?service=ghcr.io&scope=${SCOPE}")

          if [ "$STATUS" -ge 400 ] || ! grep -q '"token"' /tmp/ghcr-token.json; then
            echo "::error::GHCR auth preflight failed. Token does not have ghcr pull/push for ${{ github.repository_owner }}/${IMAGE}."
            echo "::error::Check repo Actions permissions (Read and write), package access, or configure GHCR_PAT with write:packages/read:packages."
            cat /tmp/ghcr-token.json
            exit 1
          fi

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Compute MinVer version
        id: minver
        shell: bash
        run: |
          dotnet tool install --global minver-cli --version 7.0.0
          VERSION=$(minver . -t v -p preview.0 | tail -n 1 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "MinVer produced an empty version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved MinVer version: $VERSION"

      - name: Compute OS patch date
        id: patchdate
        shell: bash
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub (avoids pull rate limits for moby/buildkit)
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags from v* git tags: v1.2.3 -> 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short SHA for traceability on every main push
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.minver.outputs.version }}
            OS_PATCH_DATE=${{ steps.patchdate.outputs.date }}
          # Each image gets its own GHA cache scope
          cache-from: type=gha,scope=${{ matrix.label }}
          cache-to: type=gha,scope=${{ matrix.label }},mode=min,ignore-error=true

      - name: Sign image with Cosign
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
