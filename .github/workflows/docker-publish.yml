name: Build and publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # All-in-one image (frontend + API + worker + postgres + mosquitto + saic gateway)
          - label: all-in-one
            image: garagestack
            context: .
            dockerfile: docker/all-in-one/Dockerfile

          # Individual service images (used with docker-compose)
          - label: frontend
            image: garagestack-frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile

          - label: api
            image: garagestack-api
            context: .
            dockerfile: src/GarageStack.Api/Dockerfile

          - label: worker
            image: garagestack-worker
            context: .
            dockerfile: src/GarageStack.Worker/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags from v* git tags: v1.2.3 -> 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short SHA for traceability on every main push
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Each image gets its own GHA cache scope
          cache-from: type=gha,scope=${{ matrix.label }}
          cache-to: type=gha,scope=${{ matrix.label }},mode=min
