name: Auto-merge Dependabot PRs

on:
  pull_request_target:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge GitHub Actions updates
        if: steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor updates for safe dev-dependency groups
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' && (
            steps.meta.outputs.dependency-group == 'linting' ||
            steps.meta.outputs.dependency-group == 'testing' ||
            steps.meta.outputs.dependency-group == 'typescript-and-types' ||
            steps.meta.outputs.dependency-group == 'test-framework' ||
            steps.meta.outputs.dependency-group == 'docker-actions' ||
            steps.meta.outputs.dependency-group == 'github-actions'
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
