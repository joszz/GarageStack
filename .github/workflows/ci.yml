name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: |
          pnpm run lint
          git diff --exit-code

      - name: Format check
        working-directory: frontend
        run: pnpm exec prettier --check src/

  frontend-typecheck:
    name: Frontend type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: frontend
        run: pnpm run type-check

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend
        run: pnpm run test:unit --run

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  container-build:
    name: Container build (${{ matrix.label }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: all-in-one
            context: .
            dockerfile: docker/all-in-one/Dockerfile
          - label: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - label: api
            context: .
            dockerfile: src/GarageStack.Api/Dockerfile
          - label: worker
            context: .
            dockerfile: src/GarageStack.Worker/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub (avoids pull rate limits)
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: APP_VERSION=0.0.0-ci
          cache-from: type=gha,scope=ci-${{ matrix.label }}
          cache-to: type=gha,scope=ci-${{ matrix.label }},mode=min
