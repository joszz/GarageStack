name: Stale issues and PRs

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stale:
    name: Mark stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10.4.0
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. Feel free to re-open it if it is still relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs.
          close-issue-message: >
            This issue was closed automatically due to inactivity. Please
            re-open if it is still relevant.
          close-pr-message: >
            This pull request was closed automatically due to inactivity.
          exempt-issue-labels: 'pinned,security,bug,enhancement'
          exempt-pr-labels: 'pinned,security,do-not-merge'
          exempt-all-milestones: true
