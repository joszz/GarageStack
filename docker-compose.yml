services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    entrypoint: /bin/sh
    command: >
      -c "
      set -eu;
      rm -f /mosquitto/data/passwd /mosquitto/data/acl;
      mosquitto_passwd -b -c /mosquitto/data/passwd \"${MQTT_BROKER_USERNAME:-garagestack}\" \"${MQTT_BROKER_PASSWORD:-garagestack}\";
      printf 'user %s\\ntopic readwrite #\\n' \"${MQTT_BROKER_USERNAME:-garagestack}\" > /mosquitto/data/acl;
      chown mosquitto:mosquitto /mosquitto/data/passwd /mosquitto/data/acl;
      chmod 600 /mosquitto/data/passwd /mosquitto/data/acl;
      exec /docker-entrypoint.sh /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "
    ports:
      - "${MQTT_BIND_ADDRESS:-127.0.0.1}:${MQTT_EXTERNAL_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data/

  saic-mqtt-gateway:
    image: saicismartapi/saic-python-mqtt-gateway:0.12.0
    container_name: saic-mqtt
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      - mosquitto
    environment:
      SAIC_USER: "${SAIC_USER}"
      SAIC_PASSWORD: "${SAIC_PASSWORD}"
      MQTT_URI: "tcp://mosquitto:1883"
      MQTT_USER: "${MQTT_BROKER_USERNAME:-garagestack}"
      MQTT_PASSWORD: "${MQTT_BROKER_PASSWORD:-garagestack}"
      SAIC_REGION: "${SAIC_REGION:-eu}"
      SAIC_REST_URI: "${SAIC_REST_URI:-}"
    volumes:
      - ./docker/resolve-saic-rest-uri.sh:/resolve-saic-rest-uri.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: [". /resolve-saic-rest-uri.sh && exec python ./main.py"]

  # Bundled Postgres - only starts when you pass --profile bundled-postgres.
  # Skip this and set POSTGRES_HOST to your own server to reuse an existing instance.
  postgres:
    profiles:
      - bundled-postgres
    image: postgres:18-alpine
    container_name: garagestack-postgres
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-garagestack}"
      POSTGRES_USER: "${POSTGRES_USER:-garagestack}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-garagestack}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garagestack} -d ${POSTGRES_DB:-garagestack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: src/GarageStack.Worker/Dockerfile
    container_name: garagestack-worker
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/joszz/garagestack/main/frontend/public/pwa-192x192.png"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mosquitto:
        condition: service_started
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-garagestack};Username=${POSTGRES_USER:-garagestack};Password=${POSTGRES_PASSWORD:-garagestack}"
      Mqtt__Host: "${MQTT_HOST:-mosquitto}"
      Mqtt__Port: "${MQTT_PORT:-1883}"
      Mqtt__Username: "${MQTT_BROKER_USERNAME:-garagestack}"
      Mqtt__Password: "${MQTT_BROKER_PASSWORD:-garagestack}"
      Vapid__PublicKey: "${VAPID_PUBLIC_KEY}"
      Vapid__PrivateKey: "${VAPID_PRIVATE_KEY}"
      Vapid__Subject: "mailto:${SAIC_USER}"
      TyrePressure__LowBar: "${TYRE_PRESSURE_LOW_BAR:-2.2}"
      TyrePressure__GoodBar: "${TYRE_PRESSURE_GOOD_BAR:-2.6}"
      TyrePressure__HighBar: "${TYRE_PRESSURE_HIGH_BAR:-3.2}"
    volumes:
      - worker_logs:/app/logs

  api:
    build:
      context: .
      dockerfile: src/GarageStack.Api/Dockerfile
    container_name: garagestack-api
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/joszz/garagestack/main/frontend/public/pwa-192x192.png"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mosquitto:
        condition: service_started
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-garagestack};Username=${POSTGRES_USER:-garagestack};Password=${POSTGRES_PASSWORD:-garagestack}"
      Cors__Origins__0: "${CORS_ORIGIN:-http://localhost:8080}"
      Jwt__Secret: "${JWT_SECRET}"
      SAIC_USER: "${SAIC_USER}"
      SAIC_PASSWORD: "${SAIC_PASSWORD}"
      Auth__Username: "${SAIC_USER}"
      Auth__Password: "${SAIC_PASSWORD}"
      Mqtt__Host: "${MQTT_HOST:-mosquitto}"
      Mqtt__Port: "${MQTT_PORT:-1883}"
      Mqtt__Username: "${MQTT_BROKER_USERNAME:-garagestack}"
      Mqtt__Password: "${MQTT_BROKER_PASSWORD:-garagestack}"
      Vapid__PublicKey: "${VAPID_PUBLIC_KEY}"
      Vapid__PrivateKey: "${VAPID_PRIVATE_KEY}"
      Vapid__Subject: "mailto:${SAIC_USER}"
      Widget__ApiKey: "${WIDGET_API_KEY:-}"
      OpenChargeMap__ApiKey: "${OPENCHARGEMAP_API_KEY:-}"
      Auth__CookieSecure: "${AUTH_COOKIE_SECURE:-false}"
      TyrePressure__LowBar: "${TYRE_PRESSURE_LOW_BAR:-2.2}"
      TyrePressure__GoodBar: "${TYRE_PRESSURE_GOOD_BAR:-2.6}"
      TyrePressure__HighBar: "${TYRE_PRESSURE_HIGH_BAR:-3.2}"
    ports:
      - "127.0.0.1:${API_PORT:-5000}:8080"
    volumes:
      - api_logs:/app/logs
      - api_dataprotection:/app/keys

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: garagestack-frontend
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/joszz/garagestack/main/frontend/public/pwa-192x192.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:80]/"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  mosquitto_data:
  worker_logs:
  api_logs:
  api_dataprotection:
